<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almoxarifado – Controle de Materiais</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="header-label">SISTEMA</span>
      <h1>Almoxarifado</h1>
      <span class="header-sub">Controle de Inventário</span>
    </div>
  </header>

  <main>
    <section class="card form-card">
      <h2>Cadastrar Material</h2>

      <div class="field">
        <label for="input-nome">Nome do Material</label>
        <input
          type="text"
          id="input-nome"
          placeholder="Ex: Parafuso M6"
          autocomplete="off"
        />
      </div>

      <div class="field">
        <label for="input-quantidade">Quantidade</label>
        <input
          type="number"
          id="input-quantidade"
          placeholder="Ex: 100"
          min="0"
        />
      </div>

      <button id="btn-cadastrar">Cadastrar</button>

      <p id="feedback" class="feedback" aria-live="polite"></p>
    </section>

    <section class="card list-card">
      <h2>Materiais em Estoque</h2>

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>Quantidade</th>
          </tr>
        </thead>
        <tbody id="lista-materiais">
          <tr class="empty-row">
            <td colspan="3">Carregando materiais…</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
