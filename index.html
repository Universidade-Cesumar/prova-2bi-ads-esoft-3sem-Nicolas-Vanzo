<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
</head>
<body>

    <header>
        <div class="header-inner">
        <span class="header-label">SISTEMA</span>
        <h1>Almoxarifado</h1>
        <span class="header-sub">Controle de Inventário</span>
        </div>
    </header>

    <main>
        <section class="card form-card">
            <h2>Cadastrar Material</h2>

            <div class="field">
                <label for="input-nome">Nome do Material</label>
                <input type="text" id="input-nome" placeholder="Ex: Parafuso M6" autocomplete="off" />
            </div>

            <div class="field">
                <label for="input-quantidade">Quantidade</label>
                <input type="number" id="input-quantidade" placeholder="Ex: 10" min="0" />
            </div>

            <button id="btn-cadastrar">Cadastrar</button>

            <p id="feedback" class="feedback" aria-live="polite"></p>
        </section>
    </main>


</body>
</html>
